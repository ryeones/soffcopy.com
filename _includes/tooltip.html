<div id="tooltip" style="display:none; position:fixed; background:#faf4e5; border:0.5px solid #ccc; padding:12px 16px; max-width:280px; font-size:13px; line-height:1.6; color:#333; pointer-events:none; z-index:999;"></div>

<script>
const tooltip = document.getElementById('tooltip');

document.querySelectorAll('a.internal-link').forEach(link => {
  link.addEventListener('mouseenter', async (e) => {
    const res = await fetch(link.href);
    const html = await res.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const content = doc.querySelector('main p');
    if (content) {
      tooltip.innerText = content.innerText;
      tooltip.style.display = 'block';
    }
  });

  link.addEventListener('mousemove', (e) => {
    tooltip.style.left = (e.clientX + 16) + 'px';
    tooltip.style.top = (e.clientY + 16) + 'px';
  });

  link.addEventListener('mouseleave', () => {
    tooltip.style.display = 'none';
  });
});
</script>
